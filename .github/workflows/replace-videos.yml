name: Replace videos with compressed versions

on:
  workflow_dispatch:

permissions: write-all

jobs:
  replace-videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch master branch
        run: git fetch origin master

      - name: Replace videos from master
        run: |
          echo "当前视频大小:"
          ls -lh assets/video-works/*.mp4
          
          echo "替换为 master 分支的压缩版..."
          for f in trailer.mp4 xiaomi-su7-ultra.mp4 hangzhou-geometry.mp4; do
            git show origin/master:assets/video-works/$f > assets/video-works/$f
          done
          
          echo "替换后:"
          ls -lh assets/video-works/*.mp4

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/video-works/
          git commit -m "fix: replace with compressed videos (<50MB, jsDelivr compatible)

          - trailer.mp4: 66.2MB -> 47.5MB
          - xiaomi-su7-ultra.mp4: 94.7MB -> 47.7MB
          - hangzhou-geometry.mp4: 74.6MB -> 44.3MB"
          git push origin main
