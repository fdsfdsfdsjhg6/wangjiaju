name: Replace Videos with Originals

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup GitHub CLI
        run: |
          type -p gh >/dev/null || ( echo "gh already installed" )

      - name: Download original videos from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/originals
          gh release download v1.0-videos --repo fdsfdsfdsjhg6/wangjiaju -D /tmp/originals --clobber
          ls -lh /tmp/originals/

      - name: Replace compressed videos with originals
        run: |
          cp /tmp/originals/trailer.mp4 assets/ai-visuals/trailer.mp4
          cp /tmp/originals/xiaomi-su7-ultra.mp4 assets/video-works/xiaomi-su7-ultra.mp4
          cp /tmp/originals/hangzhou-geometry.mp4 assets/video-works/hangzhou-geometry.mp4
          echo "Replacement done:"
          ls -lh assets/ai-visuals/trailer.mp4
          ls -lh assets/video-works/xiaomi-su7-ultra.mp4
          ls -lh assets/video-works/hangzhou-geometry.mp4

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/ai-visuals/trailer.mp4 assets/video-works/xiaomi-su7-ultra.mp4 assets/video-works/hangzhou-geometry.mp4
          git commit -m "Replace compressed videos with originals from Release v1.0-videos"
          git push
