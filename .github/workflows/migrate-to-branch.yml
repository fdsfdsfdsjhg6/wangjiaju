name: Migrate Assets to Branch

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download assets from Releases
        run: |
          mkdir -p assets/images assets/ai-visuals assets/graphic-design assets/3d-models assets/ecommerce assets/video-works assets/music

          # v1.0-all-assets
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/bgm.ogg" -o "assets/music/bgm.ogg"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/img-about.png" -o "assets/images/img-about.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/wf-screenshot172.png" -o "assets/images/wf-screenshot172.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/ip-process.png" -o "assets/images/ip-process.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/superman.png" -o "assets/graphic-design/superman.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/washing-machine.jpg" -o "assets/graphic-design/washing-machine.jpg"
          curl -sL "https://github.com/fdsfdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/ocean-outfit.jpg" -o "assets/graphic-design/ocean-outfit.jpg"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/crystal-brick.jpg" -o "assets/graphic-design/crystal-brick.jpg"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/phone-white.jpg" -o "assets/3d-models/phone-white.jpg"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/phone-render.png" -o "assets/3d-models/phone-render.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/bath-white.png" -o "assets/3d-models/bath-white.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/bath-render.png" -o "assets/3d-models/bath-render.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/beer-ad1.png" -o "assets/ecommerce/beer-ad1.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/beer-ad2.png" -o "assets/ecommerce/beer-ad2.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/figure-ecom1.jpg" -o "assets/ecommerce/figure-ecom1.jpg"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/figure-ecom2.jpg" -o "assets/ecommerce/figure-ecom2.jpg"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/figure-ecom3.jpg" -o "assets/ecommerce/figure-ecom3.jpg"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/handsoap.png" -o "assets/ecommerce/handsoap.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/fj1.png" -o "assets/ai-visuals/fj1.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/fj2.png" -o "assets/ai-visuals/fj2.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/fj3.png" -o "assets/ai-visuals/fj3.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/fj4.png" -o "assets/ai-visuals/fj4.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/fj5.png" -o "assets/ai-visuals/fj5.png"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/clip-photo1.jpg" -o "assets/video-works/clip-photo1.jpg"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-all-assets/clip-photo2.jpeg" -o "assets/video-works/clip-photo2.jpeg"

          # v1.0-videos
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-videos/trailer.mp4" -o "assets/video-works/trailer.mp4"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-videos/xiaomi-su7-ultra.mp4" -o "assets/video-works/xiaomi-su7-ultra.mp4"
          curl -sL "https://github.com/fdsfdsfdsjhg6/wangjiaju/releases/download/v1.0-videos/hangzhou-geometry.mp4" -o "assets/video-works/hangzhou-geometry.mp4"

          echo "=== Downloaded files ==="
          find assets -type f | sort
          echo ""
          echo "=== File sizes ==="
          find assets -type f -exec ls -lh {} \; | awk '{print $5, $9}'

      - name: Commit and push
        run: |
          git config user.name "OpenClaw"
          git config user.email "openclaw@agent.local"
          git add assets/
          git diff --cached --stat
          git commit -m "feat: migrate all media assets to branch for jsDelivr CDN" || echo "No changes"
          git push

      - name: Tag release
        run: |
          git tag release
          git push origin release || echo "Tag may already exist"
          echo "✅ Done! Files now accessible via jsDelivr: https://cdn.jsdelivr.net/gh/fdsfdsfdsjhg6/wangjiaju@release/assets/..."
