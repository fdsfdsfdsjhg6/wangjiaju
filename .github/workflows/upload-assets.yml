name: Upload All Assets to Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete old release and tag
        run: |
          curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/fdsfdsfdsjhg6/wangjiaju/releases/tags/v1.0-all-assets" || echo "no release"
          curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/fdsfdsfdsjhg6/wangjiaju/git/refs/tags/v1.0-all-assets" || echo "no tag"
      - name: Create release
        run: |
          RESP=$(curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/fdsfdsfdsjhg6/wangjiaju/releases" -d '{"tag_name":"v1.0-all-assets","name":"v1.0-all-assets","body":"All media","draft":false,"prerelease":false"')
          URL=$(echo "$RESP" | python3 -c "import sys,json;print(json.load(sys.stdin)['upload_url'].split('{')[0])")
          echo "UPLOAD_URL=$URL" >> $GITHUB_ENV
          echo "Release created: $URL"
      - name: Upload assets
        run: |
          cd assets
          find . -type f | sort | while IFS= read -r fp; do
            fn=$(basename "$fp")
            echo "Uploading $fp as $fn"
            curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Content-Type: application/octet-stream" --data-binary "@$fp" "$UPLOAD_URL?name=$fn" > /dev/null
            echo "  done: $fn"
          done
          echo "All complete!"