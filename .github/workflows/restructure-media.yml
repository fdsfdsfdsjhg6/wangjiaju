name: restructure-media
on:
  workflow_dispatch:

permissions: write-all

jobs:
  restructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move videos out of assets/
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          
          # Move video directories to top-level (outside assets/)
          git mv assets/vids videos
          
          # Clean up empty directories
          find . -type d -empty -delete 2>/dev/null || true
          
          git add -A
          git diff --cached --quiet || git commit -m "Move videos outside assets/ to fix jsDelivr 50MB limit"
          git push
