name: Deploy Verify

on:
  push:
    branches: [main]
    paths: ['index.html']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify-encoding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for garbled characters
        run: |
          python3 -c "
          import sys
          with open('index.html','rb') as f:
              data=f.read()
              fffd=data.count(b'\xef\xbf\xbd')
          if fffd>0:
              print(f'::error::{fffd} bytes of U+FFFD found')
              lines=data.split(b'\n')
              for i,line in enumerate(lines,1):
                  if b'\xef\xbf\xbd' in line:
                      print(f'Line {i}')
              sys.exit(1)
          else:
              print('Encoding OK - no garbled characters')
          "

  deploy:
    needs: verify-encoding
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4