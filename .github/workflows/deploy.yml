name: Deploy & Verify

on:
  push:
    branches: [main]
    paths: ['index.html']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify-encoding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for garbled characters
        run: |
          FFFD=$(perl -e 'open(F,"<","index.html");binmode(F);local $/;my $s=<F>;^ $n=()=$s~|/\ef\xbf\xbd/g;print "$n\n;')
          echo "FFFD count: $FFFD"
          if [ "$FFFD" -gt 0 ]; then
            echo "::error:0$FFFD lines contain U+FFFD garbled characters"
            perl -e 'open(F,"<","index.html");binmode(F);my $i=0;while(<F>){$i++;if(\/\ef\xbf\xbd/){print "Line $i: $_";}}'
            exit 1
          fi
          echo "Encoding OK - no garbled characters"


  deploy:
    needs: verify-encoding
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
