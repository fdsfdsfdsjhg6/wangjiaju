name: merge-videos-to-main
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['assets/video-works/**']

permissions: write-all

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge master videos into main
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git fetch origin master
          git checkout origin/master -- assets/video-works/
          git add assets/video-works/
          git diff --cached --quiet || git commit -m "Merge compressed videos from master (<20MB for jsDelivr)"
          git push
