name: Build CDN Assets

on:
  workflow_dispatch:
    inputs:
      quality:
        description: 'WebP quality (1-100)'
        required: false
        default: '80'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: fdsfdsfdsjhg6/wangjiaju
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            assets/images
            assets/ai-visuals
            assets/graphic-design
            assets/3d-models
            assets/ecommerce
            assets/music

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sharp
        run: npm install sharp

      - name: Compress images and build CDN repo
        env:
          QUALITY: ${{ github.event.inputs.quality || '80' }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const path = require('path');
          const sharp = require('sharp');
          const { execSync } = require('child_process');

          const CDN_DIR = '/tmp/wangjiaju-cdn';
          const FILES = [
            'assets/images/img-about.png',
            'assets/images/wf-screenshot172.png',
            'assets/images/ip-process.png',
            'assets/ai-visuals/fj1.png',
            'assets/ai-visuals/fj2.png',
            'assets/ai-visuals/fj3.png',
            'assets/ai-visuals/fj4.png',
            'assets/ai-visuals/fj5.png',
            'assets/graphic-design/superman.png',
            'assets/graphic-design/washing-machine.jpg',
            'assets/graphic-design/ocean-outfit.jpg',
            'assets/graphic-design/crystal-brick.jpg',
            'assets/3d-models/phone-white.jpg',
            'assets/3d-models/phone-render.png',
            'assets/3d-models/bath-white.png',
            'assets/3d-models/bath-render.png',
            'assets/ecommerce/beer-ad1.png',
            'assets/ecommerce/beer-ad2.png',
            'assets/ecommerce/figure-ecom1.jpg',
            'assets/ecommerce/figure-ecom2.jpg',
            'assets/ecommerce/figure-ecom3.jpg',
            'assets/ecommerce/handsoap.png',
            'assets/images/clip-photo1.jpg',
            'assets/images/clip-photo2.jpeg',
            'assets/music/bgm.ogg',
          ];

          const quality = parseInt(process.env.QUALITY || '80');
          let totalOrig = 0, totalComp = 0;
          const urlMap = {}; // original relative URL → new CDN URL

          for (const file of FILES) {
            const src = file;
            if (!fs.existsSync(src)) {
              console.log('SKIP (not found): ' + file);
              continue;
            }
            const size = fs.statSync(src).size;
            totalOrig += size;
            const ext = path.extname(file).toLowerCase();
            const name = path.basename(file, ext);
            const dir = path.dirname(file);

            if (ext === '.png' && size > 1048576) {
              // Large PNG → WebP
              const dest = path.join(CDN_DIR, dir, name + '.webp');
              fs.mkdirSync(path.dirname(dest), { recursive: true });
              await sharp(src).webp({ quality, effort: 4 }).toFile(dest);
              const newSize = fs.statSync(dest).size;
              totalComp += newSize;
              // Map: original GitHub Pages URL → new jsDelivr URL
              const origUrl = 'https://fdsfdsfdsjhg6.github.io/wangjiaju/' + file;
              const newUrl = 'https://cdn.jsdelivr.net/gh/fdsfdsfdsjhg6/wangjiaju-cdn@main/' + dir + '/' + name + '.webp';
              urlMap[origUrl] = newUrl;
              const pct = ((1 - newSize / size) * 100).toFixed(1);
              console.log(`${(size/1048576).toFixed(2)}→${(newSize/1048576).toFixed(2)}MB (-${pct}%) ${file}`);
            } else if (ext === '.jpg' || ext === '.jpeg') {
              // JPG → WebP
              const dest = path.join(CDN_DIR, dir, name + '.webp');
              fs.mkdirSync(path.dirname(dest), { recursive: true });
              await sharp(src).webp({ quality, effort: 4 }).toFile(dest);
              const newSize = fs.statSync(dest).size;
              totalComp += newSize;
              const origUrl = 'https://fdsfdsfdsjhg6.github.io/wangjiaju/' + file;
              const newUrl = 'https://cdn.jsdelivr.net/gh/fdsfdsfdsjhg6/wangjiaju-cdn@main/' + dir + '/' + name + '.webp';
              urlMap[origUrl] = newUrl;
              const pct = ((1 - newSize / size) * 100).toFixed(1);
              console.log(`${(size/1048576).toFixed(2)}→${(newSize/1048576).toFixed(2)}MB (-${pct}%) ${file}`);
            } else {
              // Keep as-is
              const dest = path.join(CDN_DIR, file);
              fs.mkdirSync(path.dirname(dest), { recursive: true });
              fs.copyFileSync(src, dest);
              totalComp += size;
              const origUrl = 'https://fdsfdsfdsjhg6.github.io/wangjiaju/' + file;
              const newUrl = 'https://cdn.jsdelivr.net/gh/fdsfdsfdsjhg6/wangjiaju-cdn@main/' + file;
              urlMap[origUrl] = newUrl;
              console.log(`${(size/1048576).toFixed(2)}MB (kept) ${file}`);
            }
          }

          console.log('\n--- SUMMARY ---');
          console.log(`Original: ${(totalOrig/1048576).toFixed(2)}MB`);
          console.log(`Compressed: ${(totalComp/1048576).toFixed(2)}MB`);
          console.log(`Saved: ${((1-totalComp/totalOrig)*100).toFixed(1)}%`);
          console.log(`jsDelivr: ${totalComp > 50*1048576 ? 'EXCEED by ' + ((totalComp-50*1048576)/1048576).toFixed(2) + 'MB' : 'OK'}`);

          // Save URL mapping for index.html update
          fs.writeFileSync('/tmp/url_mapping.json', JSON.stringify(urlMap, null, 2));
          console.log('\nURL mapping saved. Files: ' + Object.keys(urlMap).length);
          SCRIPT

      - name: Init CDN repo and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/wangjiaju-cdn

          # Check if CDN repo exists
          if gh repo view fdsfdsfdsjhg6/wangjiaju-cdn >/dev/null 2>&1; then
            echo "CDN repo exists, updating..."
          else
            echo "Creating CDN repo..."
            gh repo create fdsfdsfdsjhg6/wangjiaju-cdn --public --description "CDN assets for wangjiaju website (jsDelivr)"
          fi

          # Init and push
          git init
          git checkout -b main
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "CDN assets: compressed images + music"

          # Force push (clean repo, no history needed)
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/fdsfdsfdsjhg6/wangjiaju-cdn.git
          git push --force origin main 2>&1 || {
            echo "Push failed, trying with gh..."
            # Alternative: delete and recreate
            gh repo delete fdsfdsfdsjhg6/wangjiaju-cdn --yes 2>/dev/null
            sleep 5
            gh repo create fdsfdsfdsjhg6/wangjiaju-cdn --public --description "CDN assets for wangjiaju website (jsDelivr)"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/fdsfdsfdsjhg6/wangjiaju-cdn.git
            git push --force origin main
          }

          echo "CDN repo pushed successfully!"

      - name: Upload URL mapping
        uses: actions/upload-artifact@v4
        with:
          name: url-mapping
          path: /tmp/url_mapping.json
