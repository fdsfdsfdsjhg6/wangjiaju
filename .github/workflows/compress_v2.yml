name: Compress Images v2

on:
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sharp
        run: npm install sharp

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Run compression
        run: node .github/workflows/compress_v2.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check changes
        run: |
          echo "=== Git status ==="
          git status --short
          echo ""
          echo "=== Git diff --stat ==="
          git diff --stat HEAD
