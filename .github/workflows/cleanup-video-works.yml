name: cleanup-video-works
on:
  workflow_dispatch:

permissions: write-all

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove non-video files from video-works
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          cd assets/video-works
          # Remove all non-mp4 files
          find . -type f ! -name '*.mp4' -exec git rm {} \;
          cd ../..
          git diff --cached --quiet || git commit -m "Remove non-video files from video-works (dir size limit)"
          git push
